<meta name="viewport" content="width=device-width, initial-scale=1">

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#E7EAF0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:8px;}

.shell{width:1280px;height:864px;border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(15,23,42,.22);background:#fff;display:flex;flex-direction:column;position:relative;}

/* Toast */
.toast{position:absolute;bottom:22px;right:24px;z-index:99;background:#0F1B2D;color:#fff;font-size:12.5px;font-weight:600;padding:11px 16px;border-radius:10px;box-shadow:0 10px 30px rgba(15,23,42,.35);display:flex;align-items:center;gap:8px;transition:opacity .2s;}
.toast.hidden{display:none;}

/* Browser chrome */
.chrome{height:44px;flex:none;background:#EDEFF3;border-bottom:1px solid #DCE0E8;display:flex;align-items:center;gap:14px;padding:0 16px;}
.chrome-dots{display:flex;gap:7px;}
.chrome-dot{width:12px;height:12px;border-radius:50%;}
.chrome-url{flex:1;max-width:420px;background:#fff;border:1px solid #DCE0E8;border-radius:8px;height:26px;display:flex;align-items:center;gap:7px;padding:0 12px;font-size:12px;color:#64748B;}

/* Layout */
.body{flex:1;display:flex;min-height:0;}

/* Sidebar */
.sidebar{width:236px;flex:none;background:#0F1B2D;display:flex;flex-direction:column;padding:20px 14px;}
.sidebar-logo{display:flex;align-items:center;gap:9px;padding:0 6px 18px;}
.sidebar-logo-badge{width:30px;height:30px;border-radius:8px;background:#2563EB;display:flex;align-items:center;justify-content:center;}
.sidebar-logo-text{display:flex;align-items:center;gap:5px;}
.sidebar-logo-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.02em;}
.sidebar-logo-pill{font-size:9px;font-weight:800;color:#fff;background:#2563EB;padding:2px 5px;border-radius:4px;}
.sidebar-section{font-size:10px;font-weight:700;color:#5B6B82;text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;cursor:pointer;margin-bottom:2px;color:#AEBACB;transition:background .15s;}
.nav-item:hover{background:rgba(255,255,255,.06);}
.nav-item.active{background:#2563EB;color:#fff;}
.nav-item-label{font-size:13.5px;font-weight:600;}
.nav-item-lock{margin-left:auto;opacity:.6;}
.sidebar-privacy{margin-top:auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;font-size:11px;color:#94A3B8;line-height:1.45;}
.sidebar-privacy b{color:#CBD5E1;}

/* Main */
.main{flex:1;min-width:0;background:#F5F7FA;display:flex;flex-direction:column;overflow:hidden;}

/* Topbar */
.topbar{height:62px;flex:none;background:#fff;border-bottom:1px solid #E6EAF0;display:flex;align-items:center;justify-content:space-between;padding:0 26px;}
.topbar-left{display:flex;align-items:center;gap:10px;position:relative;}
.zone-trigger{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;margin:-6px -8px;border-radius:8px;}
.zone-trigger:hover{background:#F1F5F9;}
.zone-label{font-size:13.5px;font-weight:700;color:#0F172A;}
.sample-badge{font-size:10px;font-weight:700;color:#64748B;background:#F1F5F9;border:1px solid #E2E8F0;padding:3px 8px;border-radius:6px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.period-trigger{display:flex;align-items:center;gap:7px;border:1px solid #E2E8F0;border-radius:8px;padding:7px 12px;font-size:12.5px;color:#475569;font-weight:600;cursor:pointer;}
.period-trigger:hover{background:#F8FAFC;}
.export-btn{display:flex;align-items:center;gap:7px;background:#2563EB;border-radius:8px;padding:8px 13px;font-size:12.5px;color:#fff;font-weight:600;cursor:pointer;}
.export-btn:hover{background:#1D4ED8;}
.avatar{width:34px;height:34px;border-radius:50%;background:#0F1B2D;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}

/* Dropdown */
.dropdown{position:absolute;top:36px;left:0;z-index:70;background:#fff;border:1px solid #E2E8F0;border-radius:10px;box-shadow:0 14px 38px rgba(15,23,42,.16);min-width:240px;padding:6px;}
.dropdown.period-dd{min-width:180px;right:0;left:auto;top:40px;}
.dropdown-item{padding:9px 12px;border-radius:7px;font-size:12.5px;font-weight:600;color:#0F172A;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.dropdown-item:hover{background:#F8FAFC;}
.dropdown-item.selected{background:#EFF6FF;color:#2563EB;}

/* Content area */
.content{flex:1;overflow-y:auto;padding:24px 26px 32px;}

/* Cards */
.card{background:#fff;border:1px solid #E6EAF0;border-radius:12px;}
.card-pad{padding:18px;}

/* KPI grid */
.kpi-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.kpi-card{background:#fff;border:1px solid #E6EAF0;border-radius:12px;padding:16px;}
.kpi-label{font-size:11.5px;color:#64748B;font-weight:600;}
.kpi-value{font-size:27px;font-weight:800;color:#0F172A;letter-spacing:-.02em;line-height:1;margin-top:9px;}
.kpi-value-sm{font-size:25px;font-weight:800;line-height:1;margin-top:8px;}
.kpi-row{display:flex;align-items:flex-end;gap:8px;margin-top:9px;}
.kpi-delta{font-size:12px;font-weight:700;padding-bottom:2px;}
.kpi-sub{font-size:11px;color:#94A3B8;margin-top:7px;}

/* Section header */
.page-title{font-size:20px;font-weight:800;color:#0F172A;letter-spacing:-.02em;}
.page-sub{font-size:13px;color:#64748B;margin-top:3px;}

/* Tables */
.table-wrap{background:#fff;border:1px solid #E6EAF0;border-radius:12px;overflow:hidden;}
.table-head{display:grid;padding:10px 18px;font-size:10.5px;color:#94A3B8;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #EEF2F7;}
.table-row{display:grid;align-items:center;padding:13px 18px;border-bottom:1px solid #F1F5F9;}
.table-row:last-child{border-bottom:none;}
.table-row.clickable{cursor:pointer;}
.table-row.clickable:hover{background:#FAFAFA;}

/* Badges */
.badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;display:inline-block;}
.badge-sm{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;display:inline-block;}

/* Progress bars */
.bar-track{height:7px;border-radius:999px;background:#EEF2F7;overflow:hidden;}
.bar-track-md{height:8px;border-radius:999px;background:#EEF2F7;overflow:hidden;}
.bar-track-lg{height:10px;border-radius:6px;background:#EEF2F7;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;}

/* Chips */
.chip{font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid #E2E8F0;cursor:pointer;background:#fff;color:#475569;}
.chip:hover{background:#F8FAFC;}
.chip.active{background:#0F1B2D;color:#fff;border-color:#0F1B2D;}

/* Info banner */
.info-banner{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:12px;padding:15px 17px;display:flex;gap:12px;}
.info-text{font-size:12.5px;color:#1E3A8A;line-height:1.5;}
.privacy-banner{background:#F8FAFC;border:1px solid #E6EAF0;border-radius:10px;padding:11px 14px;display:flex;gap:10px;align-items:center;}

/* Toggle switch */
.toggle{width:40px;height:22px;border-radius:999px;padding:3px;display:flex;align-items:center;cursor:pointer;transition:background .2s;}
.toggle.on{background:#2563EB;justify-content:flex-end;}
.toggle.off{background:#CBD5E1;justify-content:flex-start;}
.toggle-thumb{width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(15,23,42,.25);}

/* Freq chips */
.freq-chip{flex:1;text-align:center;font-size:12px;font-weight:600;padding:8px 0;border-radius:8px;border:1px solid #E2E8F0;cursor:pointer;}
.freq-chip.active{background:#0F1B2D;color:#fff;border-color:#0F1B2D;}

/* Foot note */
.footnote{font-size:11px;color:#94A3B8;margin-top:12px;line-height:1.5;}

/* Person avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}

/* Back link */
.back-link{display:flex;align-items:center;gap:6px;color:#64748B;font-size:12.5px;font-weight:600;cursor:pointer;margin-bottom:14px;}
.back-link:hover{color:#0F172A;}

/* Attention cards */
.attention-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
.attention-card{background:#fff;border:1px solid #E6EAF0;border-radius:11px;padding:13px 15px;cursor:pointer;}
.attention-card:hover{border-color:#BFDBFE;}

/* Chart area */
.chart-legend{display:flex;align-items:center;gap:14px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#64748B;font-weight:600;}
.legend-dot{width:9px;height:9px;border-radius:2px;}
</style>
</head>

// ─── HELPERS ─────────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 2400);
}

function svgCheck() {
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
}

function go(id) {
  state.view = id;
  state.personId = null;
  state.zoneOpen = false;
  state.periodOpen = false;
  renderNav();
  renderContent();
}

function toggleZone() {
  state.zoneOpen = !state.zoneOpen;
  state.periodOpen = false;
  renderDropdowns();
}
function togglePeriod() {
  state.periodOpen = !state.periodOpen;
  state.zoneOpen = false;
  renderDropdowns();
}
function pickZone(z) {
  state.zone = z;
  state.zoneOpen = false;
  document.getElementById('zone-label').textContent = 'Hyundai — ' + z;
  renderDropdowns();
  renderContent();
  showToast('Switched to ' + z + ' · sample data');
}
function pickPeriod(p) {
  state.period = p;
  state.periodOpen = false;
  document.getElementById('period-label').textContent = p;
  renderDropdowns();
  showToast('Period: ' + p + ' · sample data refreshed');
}
function doExport() { showToast('Zone report exported — sample PDF'); }

document.addEventListener('click', e => {
  if (!e.target.closest('#zone-trigger') && !e.target.closest('#zone-dd')) {
    state.zoneOpen = false; renderDropdowns();
  }
  if (!e.target.closest('#period-trigger') && !e.target.closest('#period-dd')) {
    state.periodOpen = false; renderDropdowns();
  }
});

// ─── RENDER: NAV ────────────────────────────────────────────────────────────

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = navItems.map(n => `
    <div class="nav-item ${state.view === n.id ? 'active' : ''}" onclick="go('${n.id}')">
      ${n.icon}
      <span class="nav-item-label">${n.label}</span>
      ${n.lock ? '<svg class="nav-item-lock" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>' : ''}
    </div>`).join('');
}

// ─── RENDER: DROPDOWNS ──────────────────────────────────────────────────────

function renderDropdowns() {
  const zdd = document.getElementById('zone-dd');
  zdd.style.display = state.zoneOpen ? 'block' : 'none';
  if (state.zoneOpen) {
    zdd.innerHTML = zones.map(z => `
      <div class="dropdown-item ${z === state.zone ? 'selected' : ''}" onclick="pickZone('${z}')">
        ${z} ${z === state.zone ? svgCheck() : ''}
      </div>`).join('');
  }
  const pdd = document.getElementById('period-dd');
  pdd.style.display = state.periodOpen ? 'block' : 'none';
  if (state.periodOpen) {
    pdd.innerHTML = periods.map(p => `
      <div class="dropdown-item ${p === state.period ? 'selected' : ''}" onclick="pickPeriod('${p}')">
        ${p} ${p === state.period ? svgCheck() : ''}
      </div>`).join('');
  }
}

// ─── RENDER: VIEWS ───────────────────────────────────────────────────────────

function renderContent() {
  const el = document.getElementById('content');
  const v = state.view;
  if (v === 'overview') el.innerHTML = renderOverview();
  else if (v === 'people') el.innerHTML = state.personId ? renderProfile() : renderRoster();
  else if (v === 'skill') el.innerHTML = renderSkill();
  else if (v === 'roi') el.innerHTML = renderROI();
  else if (v === 'adoption') el.innerHTML = renderAdoption();
  else if (v === 'market') el.innerHTML = renderMarket();
  else if (v === 'bench') el.innerHTML = renderBench();
  else if (v === 'health') el.innerHTML = renderHealth();
  else if (v === 'settings') el.innerHTML = renderSettings();
}

    <div class="page-sub">How your zone stacks up against the rest of the country.</div>

    <div class="info-banner" style="margin-top:16px;">
      <span style="font-size:22px;">🥈</span>
      <div class="info-text"><b>Pune North ranks #2 of 12 zones.</b> Adoption is 1pt behind Mumbai West — closing the Hinjewadi gap would take the top spot.</div>
    </div>

    <div class="table-wrap" style="margin-top:14px;">
      <div class="table-head" style="grid-template-columns:0.6fr 1.6fr 1fr 1fr 1.2fr 1fr 0.8fr;">
        <span>Rank</span><span>Zone</span><span>Adoption</span><span>Skill idx</span><span>Walk-in → booking</span><span>Modules</span><span>Trend</span>
      </div>
      ${benchZones.map(b => `
        <div class="table-row" style="grid-template-columns:0.6fr 1.6fr 1fr 1fr 1.2fr 1fr 0.8fr;${b.me?'background:#EFF6FF;':''}">
          <span style="font-size:14px;">${medals[b.rank]||''} <b style="font-size:12.5px;color:#475569;">${b.rank}</b></span>
          <span style="font-size:13px;font-weight:600;color:#0F172A;">${b.zone}${b.me?' <span style="font-size:10px;font-weight:700;color:#2563EB;background:#DBEAFE;padding:2px 6px;border-radius:4px;margin-left:6px;">You</span>':''}</span>
          <span style="font-size:13px;color:#334155;font-weight:600;">${b.adoption}</span>
          <span style="font-size:13px;color:#334155;font-weight:600;">${b.idx}</span>
          <span style="font-size:13px;color:#334155;font-weight:600;">${b.conv}</span>
          <span style="font-size:13px;color:#334155;font-weight:600;">${b.modules}</span>
          <span style="font-size:12px;font-weight:700;color:#16A34A;">${b.trend}</span>
        </div>`).join('')}
    </div>
    <div class="footnote">Top 5 of 12 zones shown · highlighted row is your zone · sample data.</div>`;
}

// ── Dealership health ─────────────────────────────────────────────────────────

function renderHealth() {
  return `
    <div class="page-title">Dealership health</div>
    <div class="page-sub">Early signals on working conditions, derived from anonymized, aggregated usage.</div>

    <div class="info-banner" style="margin-top:16px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.8" style="flex:none;margin-top:1px;"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <div class="info-text"><b>Privacy by design.</b> No individual's practice sessions, chats, or workplace role-plays are ever visible here. Signals below are de-identified and only shown once a dealership clears a minimum sample size (k ≥ 8). DPDP-aware.</div>
    </div>

    <div class="kpi-grid-3" style="margin-top:14px;">
      ${healthKpis.map(h => `
        <div class="kpi-card">
          <div class="kpi-label">${h.label}</div>
          <div style="font-size:25px;font-weight:800;color:${h.color};margin-top:8px;line-height:1;">${h.value}</div>
          <div class="kpi-sub">${h.sub}</div>
        </div>`).join('')}
    </div>

    <div class="table-wrap" style="margin-top:14px;">
      <div style="padding:16px 18px;border-bottom:1px solid #EEF2F7;font-size:14px;font-weight:700;color:#0F172A;">
        Condition signals by dealership <span style="font-size:11px;font-weight:600;color:#94A3B8;">· anonymized</span>
      </div>
      <div class="table-head" style="grid-template-columns:1.4fr 1fr 1fr 1.1fr;">
        <span>Dealership</span><span>Workload pressure</span><span>Morale signal</span><span>Recommended action</span>
      </div>
      ${healthRows.map(r => `
        <div class="table-row" style="grid-template-columns:1.4fr 1fr 1fr 1.1fr;">
          <span style="font-size:13px;font-weight:600;color:#0F172A;">${r.name}</span>
          <span><span class="badge-sm" style="color:${r.pc};background:${r.pb};">${r.pressure}</span></span>
          <span><span class="badge-sm" style="color:${r.mc};background:${r.mb};">${r.morale}</span></span>
          <span style="font-size:12px;color:#475569;line-height:1.35;">${r.action}</span>
        </div>`).join('')}
    </div>
    <div class="footnote">Signals are illustrative and directional — they flag where to <b>ask</b>, not conclusions about individuals. Sample data.</div>`;
}

// ── Settings ──────────────────────────────────────────────────────────────────

function renderSettings() {
  const freqs = ['Daily','Weekly','Monthly'];
  return `
    <div class="page-title">Alerts & digest</div>
    <div class="page-sub">Get the console's priorities in your inbox — no dashboard hunting.</div>

    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-top:18px;align-items:start;">
      <div class="card card-pad">
        <div style="font-size:14px;font-weight:700;color:#0F172A;margin-bottom:6px;">What to include</div>
        ${digestDefs.map(d => `
          <div style="display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid #F1F5F9;">
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:600;color:#0F172A;">${d.label}</div>
              <div style="font-size:11.5px;color:#94A3B8;margin-top:2px;">${d.sub}</div>
            </div>
            <div class="toggle ${state.digest[d.key] ? 'on' : 'off'}" onclick="toggleDigest('${d.key}')">
              <div class="toggle-thumb"></div>
            </div>
          </div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="card card-pad">
          <div style="font-size:14px;font-weight:700;color:#0F172A;margin-bottom:12px;">Frequency</div>
          <div style="display:flex;gap:8px;">
            ${freqs.map(f => `
              <div class="freq-chip ${state.digestFreq === f ? 'active' : ''}" onclick="setDigestFreq('${f}')">${f}</div>`).join('')}
          </div>
          <div style="font-size:11.5px;color:#94A3B8;margin-top:10px;">${state.digestFreq} digest · Mondays 8:00 IST</div>
        </div>
        <div class="card card-pad">
          <div style="font-size:14px;font-weight:700;color:#0F172A;margin-bottom:12px;">Recipients</div>
          <div style="display:flex;align-items:center;gap:9px;padding:8px 0;">
            <div class="av" style="width:28px;height:28px;background:#0F1B2D;font-size:10px;color:#fff;">RM</div>
            <div><div style="font-size:12.5px;color:#334155;font-weight:600;">R. Mehta</div><div style="font-size:10.5px;color:#94A3B8;">Regional L&D Head</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid #F1F5F9;">
            <div class="av" style="width:28px;height:28px;background:#EFF6FF;font-size:10px;color:#2563EB;">SK</div>
            <div><div style="font-size:12.5px;color:#334155;font-weight:600;">S. Kulkarni</div><div style="font-size:10.5px;color:#94A3B8;">Zone Trainer</div></div>
          </div>
          <div style="font-size:12px;color:#2563EB;font-weight:600;cursor:pointer;margin-top:8px;" onclick="showToast('Invite sent — sample')">+ Add recipient</div>
        </div>
        <div onclick="showToast('Digest preferences saved · next send Monday 8:00')" style="background:#2563EB;color:#fff;text-align:center;padding:12px;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;">Save preferences</div>
      </div>
    </div>`;
}

function toggleDigest(key) {
  state.digest[key] = !state.digest[key];
  renderContent();
}
function setDigestFreq(f) {
  state.digestFreq = f;
  renderContent();
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderNav();
renderDropdowns();
renderContent();
</script>
</body>
</html>
